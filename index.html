<style>

.cl-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);gap:12px;font-size:13px}
.cl-item:last-child{border-bottom:none}
.cl-item-lbl{flex:1;color:var(--text);line-height:1.4}
.cl-tg{display:flex;gap:3px;flex-shrink:0}
.cl-btn{padding:3px 10px;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text2);cursor:pointer;font-weight:600;min-width:34px;text-align:center}
.cl-btn:hover{background:var(--bg3)}
.cl-btn.ok{background:var(--green-bg);color:var(--green-dark);border-color:var(--green)}
.cl-btn.bad{background:var(--red-bg);color:var(--red-dark);border-color:var(--red)}
.cl-btn.na{background:var(--bg3);color:var(--text3);border-color:var(--border)}
.cl-hist-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.cl-hist-item:last-child{border-bottom:none}

<body>
<div class="wrap" id="root"><div class="loading-screen"><span class="spinner"></span>Cargando...</div></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://mxxvphizdhinixnhtulm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_WB81yFJaOP0p4b7wiCcWDg_ajhjT68G';

const CITIES = {
  tj:  {name:'Tijuana'},
  mex: {name:'Mexicali'},
  gdl: {name:'Guadalajara'},
  ver: {name:'Veracruz'},
  hgo: {name:'Hidalgo'},
  can: {name:'Cancún'},
  mer: {name:'Mérida'},
  qro: {name:'Querétaro'},
  admin:{name:'Admin — Todas'}
};

const CLIENTS = ['Bimbo','Barcel','Oxxo','Maersk','Sensata','Dreams Jade','Bachoco','Otro'];
const LOG_TYPES = {oil:'Aceite / Preventivo', repair:'Correctivo', km:'Solo KM'};
const REPAIR_TYPES = [
  {id:'compresor',   lbl:'Compresor'},
  {id:'electrico',   lbl:'Eléctrico'},
  {id:'frenos',      lbl:'Frenos'},
  {id:'mangueras',   lbl:'Mangueras/Conexiones'},
  {id:'motor',       lbl:'Motor'},
  {id:'muelles',     lbl:'Muelles/Amortiguadores'},
  {id:'enfriamiento',lbl:'Sistema de enfriamiento'},
  {id:'transmision', lbl:'Transmisión'},
  {id:'otro',        lbl:'Otro'},
];
const TIRE_EVENTS = {new:'Llanta nueva', rotate:'Rotación', recap:'Reencauche', retire:'Baja'};
const CL_DOCS=['Licencia de Conducir','Póliza de Seguro','Tarjeta de Circulación','Placas','Extintor','Botiquín médico'];
const CL_EXTERNO=['Parabrisas delantera','Parabrisas posterior','Limpia parabrisas','Espejos laterales','Libre de modificaciones/adornos'];
const CL_CARROCERIA=['Daños en facia frontal','Daños en facia trasera','Daños carrocería lateral derecha','Daños carrocería lateral izquierdo','Ventanas lado derecho','Ventanas lado izquierdo'];
const CL_LLANTAS=['Llanta #1','Llanta #2','Llanta #3','Llanta #4','Llanta #5','Llanta #6'];
const CL_LUCES=['Bajas','Altas','Direccionales','Stops','Navegación laterales','Navegación traseras'];
const CL_NIVELES=['Presión del aire (PSI)','Nivel de aceite','Nivel de adblue','Nivel hidráulico','Nivel anticongelante'];
const POS_CFG = [
  {id:'FL', lbl:'Del\nIzq', x:26,y:46,w:22,h:42,spare:false},
  {id:'FR', lbl:'Del\nDer', x:192,y:46,w:22,h:42,spare:false},
  {id:'RLI',lbl:'TLI',     x:26,y:176,w:22,h:42,spare:false},
  {id:'RLO',lbl:'TLE',     x:2, y:176,w:22,h:42,spare:false},
  {id:'RRI',lbl:'TRI',     x:192,y:176,w:22,h:42,spare:false},
  {id:'RRO',lbl:'TRE',     x:216,y:176,w:22,h:42,spare:false},
  {id:'SP', lbl:'Ref',     x:80,y:274,w:80,h:22,spare:true},
];
const URVAN_POS = new Set(['FL','FR','RLO','RRO','SP']);
const POS_NAMES = {FL:'Delantera izquierda',FR:'Delantera derecha',RLI:'Trasera izq. interior',
  RLO:'Trasera izq. exterior',RRI:'Trasera der. interior',RRO:'Trasera der. exterior',SP:'Refacción'};

// ─── STATE ───────────────────────────────────────────────────────────────────
let sb = null;
let ST = {
  auth:null, busId:null, tab:'log', selTire:null,
  modal:null, logFilter:'all', tirePrePos:null, tirePreEvent:null,
  loginErr:'', saving:false,
  adminFilter:'all', buses:[], logs:[], toast:null, toastType:null, modalErr:'',
  view:'fleet', rptBus:'all', rptType:'all', rptFrom:'', rptTo:'',
  clView:'history'
};

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init(){
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { storage: window.sessionStorage, persistSession: true }
    });
    const { data:{ session } } = await sb.auth.getSession();
    if(session){
      const city = session.user?.user_metadata?.city;
      if(city){ ST.auth = city; const {error}=await loadFromSupabase(); if(error) console.error('Error cargando datos:', error); }
    }
  } catch(e){ console.error('Supabase unreachable:', e); }
  render();
}


// ─── SUPABASE DATA LAYER ─────────────────────────────────────────────────────
async function loadFromSupabase(){
  const {data:buses,error:e1}=await sb.from('buses').select('*');
  const {data:logs,error:e2}=await sb.from('service_logs').select('*').order('date',{ascending:false});
  if(e1||e2) return {error:(e1||e2).message};
  ST.buses=buses||[];
  ST.logs=logs||[];
  return {error:null};
}

async function dbSaveBus(bus){
  if(!sb) return {error:'Sin conexión'};
  const {error}=await sb.from('buses').upsert(bus);
  return {error};
}
async function dbSaveLog(log){
  if(!sb) return {error:'Sin conexión'};
  const {error}=await sb.from('service_logs').insert(log);
  return {error};
}
async function dbDeleteLog(id){
  if(!sb) return {error:'Sin conexión'};
  const {error}=await sb.from('service_logs').delete().eq('id',id);
  return {error};
}
async function dbDeleteBus(id){
  if(!sb) return {error:'Sin conexión'};
  const {error:e1}=await sb.from('service_logs').delete().eq('bus_id',id);
  const {error:e2}=await sb.from('buses').delete().eq('id',id);
  return {error:e1||e2};
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(n){ return Math.round(n).toLocaleString('es-MX'); }
function mxn(n){ return '$'+Math.round(n).toLocaleString('es-MX'); }
function cityBuses(){ return ST.buses.filter(b=>ST.auth==='admin'?true:b.city===ST.auth); }
function busLogs(id){ return ST.logs.filter(l=>(l.bus_id||l.busId)===id).sort((a,b)=>b.date.localeCompare(a.date)||(b.ts||0)-(a.ts||0)); }
function tireKM(tire,km){ return Math.max(0,km-(tire.kmAt||0)); }
function condFill(c){ return c==='good'?'#639922':c==='mid'?'#EF9F27':c==='worn'?'#E24B4A':'#B4B2A9'; }
function condPill(c){ return c==='good'?'pill-good':c==='mid'?'pill-mid':c==='worn'?'pill-worn':'pill-empty'; }
function condLabel(c){ return c==='good'?'Buena':c==='mid'?'Desgaste medio':c==='worn'?'Desgaste alto':'Sin datos'; }

function oilInterval(bus){ return bus.oil_interval||(bus.type==='bus'?30000:10000); }

function getServiceAlert(bus){
  const svcLogs=busLogs(bus.id).filter(l=>l.type==='svc');
  if(!svcLogs.length) return {status:'none',lastLog:null};
  const last=svcLogs[0];
  const interval=oilInterval(bus);
  const kmSince=bus.km-(last.km_after||0);
  if(kmSince>=interval) return {status:'overdue',km:kmSince,overdueBy:kmSince-interval,lastLog:last};
  return {status:'ok',km:kmSince,remaining:interval-kmSince,lastLog:last};
}

function getAlerts(bus){
  const alerts=[], logs=busLogs(bus.id);
  const interval=oilInterval(bus);
  const warn=Math.round(interval*0.9);
  const lastOil=logs.find(l=>l.type==='svc'||l.type==='oil');
  if(!lastOil) alerts.push('Sin aceite registrado');
  else { const km=bus.km-(lastOil.km_after||lastOil.kmAfter||0); if(km>=interval) alerts.push(`Aceite: ${fmt(km)} km`); else if(km>=warn) alerts.push(`Aceite próximo: ${fmt(km)} km`); }
  Object.entries(bus.tires||{}).forEach(([pos,t])=>{ if(!t) return; const km=tireKM(t,bus.km); if(km>=70000) alerts.push(`${POS_NAMES[pos]}: ${fmt(km)} km`); });
  return alerts;
}

function getSubtipo(log){
  if(log.type==='repair'){
    const parts=(log.description||'').split(' · ');
    return parts.length>1?parts[0]:'—';
  }
  const labels={oil:'Aceite / Preventivo',repair:'Correctivo',km:'Solo KM',tire:'Llanta',svc:'Cambio de aceite'};
  return labels[log.type]||log.type||'—';
}

function parseChecklist(log){
  try{ return JSON.parse((log.description||'').slice(6)); }catch(e){ return null; }
}
function getChecklistFailures(data){
  const f=[];
  Object.entries(data.docs||{}).forEach(([k,v])=>{ if(v===false) f.push(k); });
  Object.entries(data.carroceria||{}).forEach(([k,v])=>{ if(v==='M') f.push(k); });
  Object.entries(data.llantas||{}).forEach(([k,v])=>{ if(v==='M') f.push(k); });
  Object.entries(data.niveles||{}).forEach(([k,v])=>{ if(v==='M') f.push(k); });
  return f;
}
function getFleetIndicators(bus){
  const svcAl=getServiceAlert(bus);
  let oil,oilTip;
  if(svcAl.status==='none'){ oil='red'; oilTip='Sin registro de aceite'; }
  else if(svcAl.status==='overdue'){ oil='red'; oilTip=`Vencido ${fmt(svcAl.overdueBy)} km`; }
  else if(svcAl.remaining<=1000){ oil='yellow'; oilTip=`${fmt(svcAl.remaining)} km al próximo cambio`; }
  else { oil='green'; oilTip=`${fmt(svcAl.remaining)} km al próximo cambio`; }
  const clLogs=busLogs(bus.id).filter(l=>l.type==='checklist');
  let tire,tireTip;
  if(!clLogs.length){ tire='gray'; tireTip='Sin inspección registrada'; }
  else {
    const last=clLogs[0];
    const data=parseChecklist(last);
    const days=Math.floor((Date.now()-new Date(last.date+'T12:00:00').getTime())/86400000);
    const hasBadTire=data&&Object.values(data.llantas||{}).some(v=>v==='M');
    if(hasBadTire){ tire='red'; tireTip='Llanta en mal estado'; }
    else if(days>7){ tire='yellow'; tireTip=`Inspección hace ${days} días`; }
    else { tire='green'; tireTip=`Insp. hace ${days} día${days===1?'':'s'}`; }
  }
  const open=(bus.open_issues||[]).filter(i=>!i.resolved);
  return {oil,oilTip,tire,tireTip,issues:open.length?'red':'white',issuesTip:open.length?`${open.length} pendiente(s)`:'Sin pendientes'};
}
function clBoolRow(pfx,items){
  return items.map((item,i)=>`<div class="cl-item"><span class="cl-item-lbl">${item}</span><div class="cl-tg" id="${pfx}-${i}"><button class="cl-btn ok" onclick="clToggle(this,'ok')">✓</button><button class="cl-btn" onclick="clToggle(this,'bad')">✗</button></div></div>`).join('');
}
function clBMNRow(pfx,items){
  return items.map((item,i)=>`<div class="cl-item"><span class="cl-item-lbl">${item}</span><div class="cl-tg" id="${pfx}-${i}"><button class="cl-btn ok" onclick="clToggle(this,'ok')">B</button><button class="cl-btn" onclick="clToggle(this,'bad')">M</button><button class="cl-btn" onclick="clToggle(this,'na')">NA</button></div></div>`).join('');
}
function clToggle(btn,val){
  btn.closest('.cl-tg').querySelectorAll('.cl-btn').forEach(b=>b.classList.remove('ok','bad','na'));
  btn.classList.add(val);
}
function clReadBool(pfx,items){
  const r={};
  items.forEach((item,i)=>{ const g=document.getElementById(`${pfx}-${i}`); r[item]=g?!g.querySelector('.cl-btn.bad'):true; });
  return r;
}
function clReadBMN(pfx,items){
  const r={};
  items.forEach((item,i)=>{ const g=document.getElementById(`${pfx}-${i}`); r[item]=g?.querySelector('.cl-btn.bad')?'M':g?.querySelector('.cl-btn.na')?'NA':'B'; });
  return r;
}

function applyReportFilters(){
  let rows=[...ST.logs];
  if(ST.rptBus!=='all') rows=rows.filter(l=>(l.bus_id||l.busId)===ST.rptBus);
  if(ST.rptType!=='all') rows=rows.filter(l=>l.type===ST.rptType);
  if(ST.rptFrom) rows=rows.filter(l=>l.date>=ST.rptFrom);
  if(ST.rptTo)   rows=rows.filter(l=>l.date<=ST.rptTo);
  return rows.sort((a,b)=>b.date.localeCompare(a.date)||(b.ts||0)-(a.ts||0));
}

async function doLogin(){
  const email=(document.getElementById('login-email')?.value||'').trim();
  const pw=document.getElementById('login-pw')?.value||'';
  if(!email||!pw) return;
  ST.saving=true; ST.loginErr=''; render();
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){ ST.loginErr='Correo o contraseña incorrectos'; ST.saving=false; render(); return; }
  const city=data.user?.user_metadata?.city;
  if(!city){ ST.loginErr='Usuario sin ciudad asignada. Contacta al administrador.'; ST.saving=false; render(); return; }
  ST.auth=city; ST.saving=false;
  const {error:loadErr}=await loadFromSupabase();
  if(loadErr){ ST.loginErr='Error al cargar datos. Intenta de nuevo.'; ST.auth=null; ST.saving=false; render(); return; }
  render();
}

    h+=`<g class="${interactive?'tp-btn':''}" ${click}>

      h+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="7" fill="white" font-family="-apple-system,sans-serif" font-weight="600">REF</text>

function renderStatus(bus){
  const svcAl=getServiceAlert(bus);
  const interval=oilInterval(bus);
  const openIssues=(bus.open_issues||[]).filter(i=>!i.resolved);

  // Oil KM box config
  let oilBg,oilColor,oilLabel,oilValue;
  if(svcAl.status==='none'){
    oilBg='var(--bg2)'; oilColor='var(--text3)'; oilLabel='Sin registro de aceite'; oilValue='—';
  } else if(svcAl.status==='overdue'){
    oilBg='var(--red-bg)'; oilColor='var(--red-dark)';
    oilLabel=`Cambio vencido por`; oilValue=`${fmt(svcAl.overdueBy)} km`;
  } else if(svcAl.remaining<=1000){
    oilBg='var(--amber-bg)'; oilColor='var(--amber-dark)';
    oilLabel='Próximo cambio en'; oilValue=`${fmt(svcAl.remaining)} km`;
  } else {
    oilBg='var(--green-bg)'; oilColor='var(--green-dark)';
    oilLabel='Próximo cambio en'; oilValue=`${fmt(svcAl.remaining)} km`;
  }
  const lastSvcDate=svcAl.lastLog?.date;
  const nextKm=svcAl.lastLog?(svcAl.lastLog.km_after||0)+interval:null;

  let h=`<div style="background:${oilBg};border:0.5px solid ${oilColor};border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem;text-align:center">
    <div style="font-size:12px;font-weight:600;color:${oilColor};text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">${oilLabel}</div>
    <div style="font-size:48px;font-weight:700;color:${oilColor};line-height:1;margin-bottom:8px">${oilValue}</div>
    <div style="font-size:12px;color:${oilColor};opacity:0.75">${lastSvcDate?`Último cambio: ${lastSvcDate} &nbsp;·&nbsp; `:''} ${nextKm?`Siguiente a los ${fmt(nextKm)} km`:'Configura el intervalo en la pestaña Servicio'}</div>
  </div>`;

  h+=`<div class="two-col"><div>`;

  // Open issues
  if(openIssues.length){
    h+=`<div class="card" style="border-color:rgba(226,75,74,0.45);margin-bottom:10px">
      <div class="section-hdr" style="margin-bottom:0.75rem"><h4 style="color:var(--red-dark)">⚠ Acciones pendientes — ${openIssues.length}</h4></div>`;
    openIssues.forEach(iss=>{
      h+=`<div class="issue-item">
        <div style="flex:1"><div style="font-size:13px;color:var(--text);line-height:1.4">${iss.text}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Reportado: ${iss.date}</div></div>
        <button class="btn sm" onclick="doResolveIssue('${bus.id}','${iss.id}')">Resolver ✓</button>
      </div>`;
    });
    h+=`</div>`;
  }

  // Vehicle quick stats
  h+=`<div class="card">
    <h4 style="margin-bottom:0.75rem">${bus.name}</h4>
    <div class="stat-row"><span class="stat-lbl">Cliente</span><span>${bus.client}</span></div>
    <div class="stat-row"><span class="stat-lbl">Tipo</span><span>${bus.type==='bus'?'Autobús':'Urvan / Sprinter'}</span></div>
    <div class="stat-row"><span class="stat-lbl">Odómetro</span><span style="font-weight:600">${fmt(bus.km)} km</span></div>
    <div class="stat-row"><span class="stat-lbl">Intervalo aceite</span><span>${fmt(interval)} km</span></div>
    ${svcAl.lastLog?`<div class="stat-row"><span class="stat-lbl">Último servicio</span><span>${svcAl.lastLog.date}</span></div>`:''}
  </div></div>`;

  // Tire diagram
  h+=`<div><div class="card">
    <h4 style="margin-bottom:0.75rem">Estado de llantas</h4>
    ${renderTireSVG(bus, false)}
    <div style="margin-top:0.75rem;text-align:center">
      <button class="btn sm" onclick="ST.tab='tires';render()">Ver detalle →</button>
    </div>
  </div></div></div>`;

  return h;
}

function renderTires(bus){
  const tires=bus.tires||{};
  const positions=bus.type==='bus'?POS_CFG:POS_CFG.filter(p=>URVAN_POS.has(p.id));
  const sel=ST.selTire, tire=sel?tires[sel]:null;

  let h=`<div class="two-col"><div class="card"><div class="section-hdr">
    <h4>Posición de llantas — ${bus.name}</h4>
    <button class="btn sm primary" onclick="ST.modal='tire';ST.tirePrePos=null;render()">+ Evento</button>
  </div>`;

  h+=renderTireSVG(bus, true);

  h+=`<div>`;
  if(!sel){
    h+=`<div class="card" style="min-height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text3)">

  } else {
    h+=`<div class="card"><h4 style="margin-bottom:0.5rem">${POS_NAMES[sel]}</h4>`;

      h+=`<p style="font-size:13px;color:var(--text3);margin:1rem 0;line-height:1.6">Sin llanta registrada en esta posición.</p>

      const km=tireKM(tire,bus.km);

      h+=`<div class="stat-row"><span class="stat-lbl">Marca / Medida</span><span>${tire.brand||'—'}</span></div>`;
      h+=`<div class="stat-row"><span class="stat-lbl">Instalada</span><span>${tire.installDate||tire.install_date||'—'}</span></div>`;
      h+=`<div class="stat-row"><span class="stat-lbl">KM al instalar</span><span>${fmt(tire.kmAt||tire.km_at||0)}</span></div>`;
      h+=`<div class="stat-row"><span class="stat-lbl">KM recorridos</span>
        <span style="font-weight:600;color:${km>=70000?'var(--red-dark)':km>=50000?'var(--amber-dark)':'var(--green-dark)'}">${fmt(km)}</span></div>`;
      if(tire.history?.length){
        h+=`<div style="margin-top:0.75rem;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px">Historial</div>`;
        tire.history.slice(0,5).forEach(e=>{
          h+=`<div class="hist-entry"><b>${e.date}</b> · ${e.event}${e.brand?' · '+e.brand:''} · ${fmt(e.kmAt||e.km_at||0)} km${e.notes?' · '+e.notes:''}</div>`;
        });
      }
      h+=`<div style="display:flex;flex-direction:column;gap:7px;margin-top:1rem">
        <button class="btn" onclick="openTireAction('${sel}','rotate')">Rotar posición</button>
        <button class="btn" onclick="openTireAction('${sel}','new')">Reemplazar llanta</button>
        <button class="btn danger" onclick="openTireAction('${sel}','retire')">Dar de baja</button>
      </div>`;
    }
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}

function renderStats(bus){
  const logs=busLogs(bus.id);
  const byType={};
  logs.forEach(l=>{ byType[l.type]=(byType[l.type]||0)+(l.cost||0); });
  const total=Object.values(byType).reduce((a,b)=>a+b,0);
  const oilLogs=logs.filter(l=>l.type==='oil');
  let intervals=[];
  for(let i=0;i<oilLogs.length-1;i++){
    const d=(oilLogs[i].km_after||oilLogs[i].kmAfter||0)-(oilLogs[i+1].km_after||oilLogs[i+1].kmAfter||0);
    if(d>0) intervals.push(d);
  }
  const avgOil=intervals.length?Math.round(intervals.reduce((a,b)=>a+b,0)/intervals.length):null;
  const catColors={oil:'#639922',repair:'#E24B4A',km:'#378ADD'};
  const catNames={oil:'Aceite / Preventivo',repair:'Correctivos',km:'Solo KM'};

  let h=`<div class="two-col"><div>
  <div class="card"><h4 style="margin-bottom:1rem">Gasto por categoría</h4>
    ${Object.entries(catNames).map(([k,label])=>{
      const val=byType[k]||0, pct=total>0?Math.round(val/total*100):0;
      return `<div class="bar-wrap"><div class="bar-lbl"><span>${label}</span><span style="font-weight:600">${mxn(val)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${catColors[k]}"></div></div></div>`;
    }).join('')}
    <div style="margin-top:1rem;padding-top:0.75rem;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;font-weight:600;font-size:13px">
      <span>Total</span><span>${mxn(total)}</span>
    </div></div>
  ${oilLogs.length?`<div class="card">
    <h4 style="margin-bottom:0.75rem">Patrón de aceite</h4>
    <div class="stat-row"><span class="stat-lbl">Cambios registrados</span><span>${oilLogs.length}</span></div>
    ${avgOil?`<div class="stat-row"><span class="stat-lbl">Promedio entre cambios</span><span>${fmt(avgOil)} km</span></div>`:''}
    <div class="stat-row"><span class="stat-lbl">Último cambio</span><span>${oilLogs[0].date}</span></div>
    <div class="stat-row"><span class="stat-lbl">Próximo estimado</span>
      <span>${fmt((oilLogs[0].km_after||oilLogs[0].kmAfter||0)+5000)} km</span></div>
  </div>`:''}
  </div><div><div class="card">
    <h4 style="margin-bottom:0.75rem">Estado de llantas</h4>
    ${POS_CFG.map(p=>{
      if(bus.type!=='bus'&&!URVAN_POS.has(p.id)) return '';
      const t=(bus.tires||{})[p.id], km=t?tireKM(t,bus.km):null;
      return `<div class="stat-row"><span class="stat-lbl">${POS_NAMES[p.id]}</span>
        <div style="display:flex;align-items:center;gap:8px">
          ${km!==null?`<span style="font-size:12px">${fmt(km)} km</span>`:''}
          <span class="pill ${t?condPill(t.cond):'pill-empty'}" style="font-size:10px">${t?condLabel(t.cond):'Vacía'}</span>
        </div></div>`;
    }).join('')}
  </div></div></div>`;
  return h;
}

function renderChecklist(bus){
  const clLogs=busLogs(bus.id).filter(l=>l.type==='checklist');
  const openIssues=(bus.open_issues||[]).filter(i=>!i.resolved);
  if(ST.clView==='form') return renderChecklistForm(bus);
  let h='';
  if(openIssues.length){
    h+=`<div class="card" style="border-color:rgba(226,75,74,0.45);margin-bottom:10px">
      <div class="section-hdr" style="margin-bottom:0.75rem"><h4 style="color:var(--red-dark)">⚠ Acciones pendientes — ${openIssues.length}</h4></div>`;
    openIssues.forEach(iss=>{
      h+=`<div class="issue-item">
        <div style="flex:1"><div style="font-size:13px;color:var(--text);line-height:1.4">${iss.text}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Reportado: ${iss.date}</div></div>
        <button class="btn sm" onclick="doResolveIssue('${bus.id}','${iss.id}')">Resolver ✓</button>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="card"><div class="section-hdr" style="margin-bottom:0.75rem">
    <h4>Historial de inspecciones</h4>
    <button class="btn sm primary" onclick="ST.clView='form';ST.modalErr='';render()">+ Nueva inspección</button>
  </div>`;
  if(!clLogs.length){
    h+=`<div class="empty-state">Sin inspecciones registradas</div>`;
  } else {
    clLogs.forEach(l=>{
      const data=parseChecklist(l);
      const passed=data?.passed!==false;
      const failures=data?getChecklistFailures(data):[];
      h+=`<div class="cl-hist-item">
        <div style="width:8px;height:8px;border-radius:50%;background:${passed?'var(--green)':'var(--red)'};flex-shrink:0;margin-top:3px"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:500;font-size:13px">${l.date}${data?.hora?' &nbsp;·&nbsp; '+data.hora:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${data?.conductor||'—'}${l.km_after?' &nbsp;·&nbsp; '+fmt(l.km_after)+' km':''}</div>
          ${failures.length?`<div style="font-size:11px;color:var(--red-dark);margin-top:2px">${failures.slice(0,3).join(' · ')}${failures.length>3?' +'+( failures.length-3)+' más':''}</div>`:''}
        </div>
        <span class="pill ${passed?'pill-good':'pill-worn'}" style="font-size:10px;flex-shrink:0">${passed?'OK':'Observ.'}</span>
      </div>`;
    });
  }
  h+=`</div>`;
  return h;
}

async function doSaveLog(busId){
  if(ST.saving) return;
  const bus=ST.buses.find(b=>b.id===busId);
  if(!bus) return;
  const date=document.getElementById('lm-date').value;
  if(!date){ ST.modalErr='La fecha es obligatoria.'; render(); return; }
  const type=document.getElementById('lm-type').value;
  const kmVal=document.getElementById('lm-km').value;
  const costVal=document.getElementById('lm-cost').value;
  if(kmVal===''){ ST.modalErr='El odómetro es obligatorio.'; render(); return; }
  if(costVal===''){ ST.modalErr='El costo es obligatorio.'; render(); return; }
  const kmRaw=parseInt(kmVal)||0;
  const desc=document.getElementById('lm-desc').value.trim();
  const cost=parseFloat(costVal)||0;
  const tech=document.getElementById('lm-tech').value.trim();
  const kmAfter=Math.max(kmRaw,bus.km);
  const prevKm=bus.km;
  bus.km=kmAfter;
  const log={id:uid(),bus_id:busId,city:bus.city,type,date,description:desc,cost,technician:tech,km_after:kmAfter,ts:Date.now()};
  ST.logs.unshift(log);
  ST.saving=true; ST.modalErr=''; render();
  const {error:e1}=await dbSaveBus(bus);
  const {error:e2}=await dbSaveLog(log);
  if(e1||e2){
    bus.km=prevKm; ST.logs=ST.logs.filter(l=>l.id!==log.id);
    ST.saving=false; ST.modalErr='Error al guardar. Intenta de nuevo.'; render(); return;
  }
  ST.saving=false; ST.modal=null; ST.modalErr=''; render();
}

async function doSaveTire(busId){
  if(ST.saving) return;
  const bus=ST.buses.find(b=>b.id===busId);
  if(!bus) return;
  const date=document.getElementById('tm-date').value;
  if(!date){ ST.modalErr='La fecha es obligatoria.'; render(); return; }
  const pos=document.getElementById('tm-pos').value;
  const event=document.getElementById('tm-event').value;
  const kmVal=document.getElementById('tm-km').value;
  const costVal=document.getElementById('tm-cost').value;
  if(kmVal===''){ ST.modalErr='El odómetro es obligatorio.'; render(); return; }
  if(costVal===''){ ST.modalErr='El costo es obligatorio.'; render(); return; }
  const kmRaw=parseInt(kmVal)||0;
  const brand=document.getElementById('tm-brand').value.trim();
  const cond=document.getElementById('tm-cond').value;
  const cost=parseFloat(costVal)||0;
  const notes=document.getElementById('tm-notes').value.trim();
  const kmAfter=Math.max(kmRaw,bus.km);
  // snapshot for rollback
  const prevKm=bus.km;
  const prevTires=JSON.parse(JSON.stringify(bus.tires||{}));
  if(!bus.tires) bus.tires={};
  const histEntry={date,event:TIRE_EVENTS[event],brand,kmAt:kmAfter,notes};
  const prev=bus.tires[pos];
  if(event==='rotate'){
    const dest=document.getElementById('tm-dest').value;
    const srcTire={...(prev||{})};
    const dstTire=bus.tires[dest]?{...bus.tires[dest]}:null;
    const rotEntry={date,event:TIRE_EVENTS['rotate'],brand:srcTire.brand||brand,kmAt:kmAfter,notes};
    bus.tires[dest]={brand:srcTire.brand||brand,installDate:date,kmAt:kmAfter,cond,history:[rotEntry,...(srcTire.history||[])]};
    if(dstTire){
      const swapEntry={date,event:TIRE_EVENTS['rotate'],brand:dstTire.brand||'',kmAt:kmAfter,notes};
      bus.tires[pos]={...dstTire,installDate:date,kmAt:kmAfter,history:[swapEntry,...(dstTire.history||[])]};
    } else { delete bus.tires[pos]; }
    bus.km=kmAfter;
    const arrow=dstTire?'↔':'→';
    const desc=`Rotación: ${POS_NAMES[pos]} ${arrow} ${POS_NAMES[dest]}${srcTire.brand?' · '+srcTire.brand:''}`;
    const log={id:uid(),bus_id:busId,city:bus.city,type:'tire',date,description:desc,cost,km_after:kmAfter,ts:Date.now()};
    ST.logs.unshift(log);
    ST.saving=true; ST.modalErr=''; render();
    const {error:e1}=await dbSaveLog(log);
    const {error:e2}=await dbSaveBus(bus);
    if(e1||e2){
      bus.km=prevKm; bus.tires=prevTires; ST.logs=ST.logs.filter(l=>l.id!==log.id);
      ST.saving=false; ST.modalErr='Error al guardar. Intenta de nuevo.'; render(); return;
    }
    ST.saving=false; ST.modal=null; ST.tirePrePos=null; ST.tirePreEvent=null; ST.modalErr=''; ST.selTire=dest; ST.tab='tires';
    showToast(`Rotación guardada: ${POS_NAMES[pos]} ${arrow} ${POS_NAMES[dest]}`);
    return;
  }
  if(event==='retire'){
    if(prev){ if(!prev.history)prev.history=[]; prev.history.unshift(histEntry); prev.cond='worn'; }
  } else {
    bus.tires[pos]={brand:brand||(prev?.brand||''),installDate:date,kmAt:kmAfter,cond,history:[histEntry,...(prev?.history||[])]};
  }
  bus.km=kmAfter;
  const logEntry={id:uid(),bus_id:busId,city:bus.city,type:'tire',date,description:`${TIRE_EVENTS[event]} · ${POS_NAMES[pos]}${brand?' · '+brand:''}`,cost,km_after:kmAfter,ts:Date.now()};
  ST.logs.unshift(logEntry);
  ST.saving=true; ST.modalErr=''; render();
  const {error:e1}=await dbSaveBus(bus);
  const {error:e2}=await dbSaveLog(logEntry);
  if(e1||e2){
    bus.km=prevKm; bus.tires=prevTires;
    ST.logs=ST.logs.filter(l=>l.id!==logEntry.id);
    ST.saving=false; ST.modalErr='Error al guardar. Intenta de nuevo.'; render(); return;
  }
  ST.saving=false; ST.modal=null; ST.tirePrePos=null; ST.tirePreEvent=null; ST.modalErr=''; ST.selTire=pos; ST.tab='tires'; render();
}

async function doSaveChecklist(busId){
  if(ST.saving) return;
  const bus=ST.buses.find(b=>b.id===busId);
  if(!bus) return;
  const conductor=(document.getElementById('cl-conductor')?.value||'').trim();
  const fecha=document.getElementById('cl-fecha')?.value;
  const kmVal=document.getElementById('cl-km')?.value;
  if(!conductor){ showClErr('El conductor/operador es obligatorio.'); return; }
  if(!fecha){ showClErr('La fecha es obligatoria.'); return; }
  if(kmVal===''){ showClErr('El kilometraje es obligatorio.'); return; }
  showClErr('');
  const kmAfter=Math.max(parseInt(kmVal)||0,bus.km);
  const data={
    conductor,
    cliente:(document.getElementById('cl-cliente')?.value||'').trim(),
    hora:document.getElementById('cl-hora')?.value||'',
    combustible:parseFloat(document.getElementById('cl-combustible')?.value)||0,
    docs:clReadBool('cl-docs',CL_DOCS),
    externo:clReadBool('cl-externo',CL_EXTERNO),
    carroceria:clReadBMN('cl-carroceria',CL_CARROCERIA),
    llantas:clReadBMN('cl-llantas',CL_LLANTAS),
    luces:clReadBool('cl-luces',CL_LUCES),
    niveles:clReadBMN('cl-niveles',CL_NIVELES),
    anomalias:(document.getElementById('cl-anomalias')?.value||'').trim(),
    reparaciones:(document.getElementById('cl-reparaciones')?.value||'').trim(),
    operador:(document.getElementById('cl-op-name')?.value||'').trim(),
    coordinador:(document.getElementById('cl-coord')?.value||'').trim(),
  };
  data.passed=!(
    Object.values(data.docs).some(v=>v===false)||
    Object.values(data.carroceria).some(v=>v==='M')||
    Object.values(data.llantas).some(v=>v==='M')||
    Object.values(data.niveles).some(v=>v==='M')
  );
  const prevKm=bus.km;
  bus.km=kmAfter;
  const prevIssues=JSON.parse(JSON.stringify(bus.open_issues||[]));
  if(data.reparaciones){
    if(!bus.open_issues) bus.open_issues=[];
    bus.open_issues.push({id:uid(),text:data.reparaciones,date:fecha,resolved:false});
  }
  const log={id:uid(),bus_id:busId,city:bus.city,type:'checklist',date:fecha,description:'__CL__'+JSON.stringify(data),cost:0,km_after:kmAfter,ts:Date.now()};
  ST.logs.unshift(log);
  ST.saving=true; render();
  const {error:e1}=await dbSaveBus(bus);
  const {error:e2}=await dbSaveLog(log);
  if(e1||e2){
    bus.km=prevKm; bus.open_issues=prevIssues; ST.logs=ST.logs.filter(l=>l.id!==log.id);
    ST.saving=false; ST.clView='form'; render();
    showClErr('Error al guardar. Intenta de nuevo.'); return;
  }
  ST.saving=false; ST.clView='history';
  showToast(`Inspección ${data.passed?'aprobada ✓':'con observaciones'} guardada`);
}

async function doResolveIssue(busId,issueId){
  const bus=ST.buses.find(b=>b.id===busId);
  if(!bus) return;
  const iss=(bus.open_issues||[]).find(i=>i.id===issueId);
  if(!iss||iss.resolved) return;
  iss.resolved=true;
  render();
  const {error}=await dbSaveBus(bus);
  if(error){ iss.resolved=false; showToast('Error al actualizar. Intenta de nuevo.','error'); render(); }
  else showToast('Acción resuelta');
}

function exportCSV(){
  const rows=applyReportFilters();
  if(!rows.length) return;
  const typeLabels={...LOG_TYPES,tire:'Llanta'};
  const headers=['Fecha','Unidad','Ciudad','Cliente','Tipo','Subtipo','Descripcion','KM','Tecnico','Costo MXN'];
  const lines=[headers.join(',')];
  rows.forEach(l=>{
    const bus=ST.buses.find(b=>b.id===(l.bus_id||l.busId));
    const cells=[
      l.date,
      `"${(bus?.name||'').replace(/"/g,'""')}"`,
      CITIES[bus?.city]?.name||bus?.city||'',
      bus?.client||'',
      typeLabels[l.type]||l.type,
      `"${getSubtipo(l).replace(/"/g,'""')}"`,
      `"${(l.description||l.desc||'').replace(/"/g,'""')}"`,
      l.km_after||l.kmAfter||'',
      `"${(l.technician||l.tech||'').replace(/"/g,'""')}"`,
      l.cost||0
    ];
    lines.push(cells.join(','));
  });
  const blob=new Blob(['\uFEFF'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`reporte_ate_${today()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

document.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!ST.auth){ doLogin(); } });
